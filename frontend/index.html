<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/hotel-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Luxury Hotel Booking - Experience world-class hospitality and comfort" />
    <title>Grand Horizon Hotel | Luxury Accommodation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <div id="global-loader" style="
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#f9fafb;
      ">
        <div style="
          width:40px;
          height:40px;
          border:4px solid #1E3A8A;
          border-top:4px solid transparent;
          border-radius:50%;
          animation:spin 1s linear infinite;
        "></div>
      </div>
    </div>
    
    <style>
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    </style>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
